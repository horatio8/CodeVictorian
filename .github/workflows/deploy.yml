name: Build & Verify

on:
  push:
    branches: [main, claude/redesign-website-ai-agents-Jkjj0]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --legacy-peer-deps

      - run: npx next build
        env:
          API_KEY_21ST: ${{ secrets.API_KEY_21ST }}
